<style>
/* ============================================================
 * Liam — the main dashboard. Bento hub linking every app
 * in the Patron suite + a shared "Today's vitals" tile (Whoop /
 * Apple Watch / Manual). Same token system + 3 themes as the suite.
 * ============================================================ */
:root {
  color-scheme: dark;
  /* === UI/UX Pro Max — "Cyberpunk / NFT-Web3" · purple tech + gold value + neon === */
  --bg: #0F0F23; --bg-elevated: #1A1A3A;
  --surface: rgba(139,92,246,0.06); --surface-2: rgba(139,92,246,0.11);
  --fg: #F8FAFC; --muted: rgba(226,232,255,0.52); --muted-strong: rgba(226,232,255,0.80);
  --border: rgba(124,58,237,0.22); --border-strong: rgba(167,139,250,0.45);
  --brand: #8B5CF6; --brand-2: #22D3EE; --brand-ink: #0B0420;
  --brand-soft: rgba(139,92,246,0.16); --brand-line: rgba(139,92,246,0.40); --brand-glow: rgba(139,92,246,0.65);
  --pos: #22D3EE; --pos-soft: rgba(34,211,238,0.14); --pos-line: rgba(34,211,238,0.34);
  --neg: #F472B6; --neg-soft: rgba(244,114,182,0.14); --neg-line: rgba(244,114,182,0.30);
  --warn: #FBBF24; --warn-soft: rgba(251,191,36,0.12); --warn-line: rgba(251,191,36,0.30);
  --track: rgba(255,255,255,0.06);
  --card-shadow: 0 1px 0 rgba(167,139,250,0.08) inset, 0 22px 50px -28px rgba(0,0,0,0.95);
  --glow-1: rgba(139,92,246,0.22); --glow-2: rgba(34,211,238,0.12);
  --grain-opacity: 0.04; --overlay: rgba(7,4,22,0.74);
  --space-1:.25rem; --space-2:.5rem; --space-3:.75rem; --space-4:1rem;
  --space-5:1.25rem; --space-6:1.5rem; --space-8:2rem; --space-10:2.5rem; --space-12:3rem; --space-16:4rem;
  --radius-sm: 8px; --radius-md: 11px; --radius-lg: 18px; --radius-pill: 999px;
  --text-xs:.75rem; --text-sm:.875rem; --text-base:1rem; --text-lg:1.125rem;
  --text-xl:1.375rem; --text-2xl:1.75rem; --text-3xl:2.5rem;
  --ease: cubic-bezier(0.2,0.8,0.2,1); --ease-premium: cubic-bezier(0.16,1,0.3,1);
  --duration-fast:120ms; --duration:200ms;
  --font-display:'Orbitron'; --font-ui:'Exo 2'; --font-mono:'JetBrains Mono';
}
[data-theme="aurora"] {
  color-scheme: dark;
  --bg: #080913; --bg-elevated: #12131F;
  --surface: rgba(150,160,255,0.045); --surface-2: rgba(150,160,255,0.08);
  --fg: #EEF0FF; --muted: rgba(220,225,255,0.52); --muted-strong: rgba(220,225,255,0.76);
  --border: rgba(150,160,255,0.11); --border-strong: rgba(150,160,255,0.22);
  --brand: #8B7BFF; --brand-2: #B9ABFF; --brand-ink: #0A0922;
  --brand-soft: rgba(139,123,255,0.15); --brand-line: rgba(139,123,255,0.32); --brand-glow: rgba(124,107,255,0.6);
  --pos: #4FE3D0; --pos-soft: rgba(79,227,208,0.13); --pos-line: rgba(79,227,208,0.28);
  --neg: #FF6FA5; --neg-soft: rgba(255,111,165,0.13); --neg-line: rgba(255,111,165,0.28);
  --warn: #FFC65C; --warn-soft: rgba(255,198,92,0.11); --warn-line: rgba(255,198,92,0.28);
  --track: rgba(160,170,255,0.09);
  --card-shadow: 0 0 0 1px rgba(140,130,255,0.05) inset, 0 22px 56px -28px rgba(78,60,210,0.55);
  --glow-1: rgba(124,107,255,0.20); --glow-2: rgba(79,227,208,0.13);
  --grain-opacity: 0.05; --overlay: rgba(5,6,16,0.7);
}
[data-theme="daylight"] {
  color-scheme: light;
  --bg: #F3F2FA; --bg-elevated: #FFFFFF;
  --surface: #FFFFFF; --surface-2: #FAF9FF;
  --fg: #171622; --muted: rgba(23,22,34,0.52); --muted-strong: rgba(23,22,34,0.72);
  --border: rgba(23,22,60,0.10); --border-strong: rgba(23,22,60,0.18);
  --brand: #6A45FF; --brand-2: #8E6BFF; --brand-ink: #FFFFFF;
  --brand-soft: rgba(106,69,255,0.08); --brand-line: rgba(106,69,255,0.24); --brand-glow: rgba(106,69,255,0.28);
  --pos: #0E9E64; --pos-soft: rgba(14,158,100,0.10); --pos-line: rgba(14,158,100,0.26);
  --neg: #E11D63; --neg-soft: rgba(225,29,99,0.08); --neg-line: rgba(225,29,99,0.24);
  --warn: #B4690E; --warn-soft: rgba(180,105,14,0.10); --warn-line: rgba(180,105,14,0.24);
  --track: rgba(23,22,60,0.08);
  --card-shadow: 0 1px 2px rgba(23,22,60,0.05), 0 16px 34px -24px rgba(23,22,60,0.24);
  --glow-1: rgba(106,69,255,0.07); --glow-2: rgba(14,158,100,0.04);
  --grain-opacity: 0.02; --overlay: rgba(28,26,52,0.4);
}

* { box-sizing: border-box; }
html, body { margin:0; padding:0; }
body { background: var(--bg); color: var(--fg); font-family: var(--font-ui), -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: var(--text-base); -webkit-font-smoothing: antialiased; transition: background var(--duration) var(--ease); }
.grain-overlay { position: relative; }
.grain-overlay::after { content:''; position: fixed; inset:0; pointer-events:none; z-index:1; opacity: var(--grain-opacity); mix-blend-mode: overlay; background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); background-size: 200px 200px; }
.page { position: relative; min-height: 100dvh; background: var(--bg); color: var(--fg); padding: var(--space-8) var(--space-5) var(--space-16); isolation: isolate; }
.page::before { content:''; position: absolute; inset:0; pointer-events:none; z-index:-1; background: radial-gradient(58% 42% at 82% 6%, var(--glow-1), transparent 70%), radial-gradient(48% 38% at 12% 92%, var(--glow-2), transparent 72%); }
.shell { max-width: 1080px; margin: 0 auto; }

/* Header */
.header { display:flex; align-items:flex-end; justify-content:space-between; gap: var(--space-4); margin-bottom: var(--space-8); flex-wrap: wrap; }
.title { font-family: var(--font-display); font-weight: 800; font-size: var(--text-3xl); line-height: 1.0; letter-spacing: 0.03em; text-transform: uppercase; margin: 0; background: linear-gradient(120deg, #fff 35%, var(--brand-2) 75%, var(--brand)); -webkit-background-clip: text; background-clip: text; color: transparent; filter: drop-shadow(0 0 20px rgba(34,211,238,0.4)); }
.subtitle { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted); margin: 6px 0 0; }
.themeSeg { display:inline-flex; align-items:center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-pill); padding: 3px; gap: 2px; }
.themeBtn { appearance:none; background: transparent; border:0; color: var(--muted); font-family: var(--font-ui); font-size: 11px; font-weight: 600; letter-spacing: 0.02em; padding: 5px 11px 5px 8px; border-radius: var(--radius-pill); cursor: pointer; display:inline-flex; align-items:center; gap:6px; transition: background var(--duration) var(--ease-premium), color var(--duration) var(--ease-premium); }
.themeBtn:hover { color: var(--muted-strong); }
.themeSwatch { width: 11px; height: 11px; border-radius: 50%; box-shadow: 0 0 0 1px var(--border-strong) inset; flex-shrink:0; }
.themeBtnActive, .themeBtnActive:hover { background: var(--brand-soft); color: var(--fg); }
.themeBtnActive .themeSwatch { box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--brand); }

/* Header controls + profile chip */
.headerControls { display:flex; align-items:center; gap: var(--space-3); flex-wrap: wrap; }
.profileChip { display:inline-flex; align-items:center; gap: 8px; padding: 5px 13px 5px 6px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-pill); color: var(--fg); font-family: var(--font-ui); font-size: 12px; font-weight: 600; cursor: pointer; transition: border-color var(--duration) var(--ease-premium), background var(--duration) var(--ease-premium); }
.profileChip:hover { border-color: var(--brand-line); background: var(--brand-soft); }
.profileChipNew { padding: 7px 14px; color: var(--brand); border-color: var(--brand-line); background: var(--brand-soft); }
.profileAvatar { display:grid; place-items:center; width: 22px; height: 22px; border-radius: 50%; background: var(--brand); color: var(--brand-ink); font-family: var(--font-display); font-weight: 700; font-size: 12px; }
.gearBtn { display:grid; place-items:center; width: 34px; height: 34px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); color: var(--muted-strong); cursor: pointer; transition: color var(--duration) var(--ease-premium), border-color var(--duration) var(--ease-premium), background var(--duration) var(--ease-premium); }
.gearBtn:hover { color: var(--fg); border-color: var(--brand-line); background: var(--brand-soft); }

/* Daily reminders */
.reminders { display:flex; align-items:center; flex-wrap:wrap; gap: var(--space-2); margin-bottom: var(--space-5); }
.remindersLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-right: var(--space-2); }
.reminderChip { display:inline-flex; align-items:center; gap: 7px; padding: 7px 12px; border-radius: var(--radius-pill); border: 1px solid var(--warn-line); background: var(--warn-soft); color: var(--fg); font-size: 12px; font-weight: 600; text-decoration: none; transition: border-color var(--duration) var(--ease-premium), background var(--duration) var(--ease-premium), transform var(--duration) var(--ease-premium); }
.reminderChip:hover { border-color: var(--warn); transform: translateY(-1px); }
.reminderDot { width: 6px; height: 6px; border-radius: 50%; background: var(--warn); box-shadow: 0 0 8px var(--warn); flex-shrink:0; }
.reminderGo { color: var(--muted); }

/* Bento grid */
.bento { display:grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: var(--space-4); grid-auto-flow: dense; }
@media (max-width: 900px) { .bento { grid-template-columns: repeat(2, minmax(0,1fr)); } }
@media (max-width: 520px) { .bento { grid-template-columns: 1fr; } }
.tileWide { grid-column: span 2; }
@media (max-width: 520px) { .tileWide { grid-column: span 1; } }

/* App card — NFT/Web3 marketplace style: gradient "art" header + body + heart */
.card { position: relative; display:flex; flex-direction:column; padding: 0; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--bg-elevated); box-shadow: var(--card-shadow); text-decoration:none; color: var(--fg); overflow:hidden; opacity: 0; transform: translateY(14px); animation: cardIn 0.5s var(--ease-premium) forwards; transition: border-color var(--duration) var(--ease-premium), transform var(--duration) var(--ease-premium), box-shadow var(--duration) var(--ease-premium); }
.card:hover { border-color: var(--brand-line); transform: translateY(-6px); box-shadow: 0 0 0 1px var(--brand-line), 0 26px 50px -22px var(--brand-glow); }
@keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
/* staggered entrance */
.bento > *:nth-child(1){animation-delay:.02s}.bento > *:nth-child(2){animation-delay:.06s}.bento > *:nth-child(3){animation-delay:.10s}.bento > *:nth-child(4){animation-delay:.14s}.bento > *:nth-child(5){animation-delay:.18s}.bento > *:nth-child(6){animation-delay:.22s}.bento > *:nth-child(7){animation-delay:.26s}.bento > *:nth-child(8){animation-delay:.30s}.bento > *:nth-child(9){animation-delay:.34s}.bento > *:nth-child(10){animation-delay:.38s}
.cardArt { position: relative; aspect-ratio: 16/10; background: radial-gradient(circle at 50% 42%, #16162a, #0b0b14 72%); display:grid; place-items:center; overflow:hidden; }
/* per-app color comes back as a soft glow concentrated behind the icon,
   masked to a radial so it fades to the dark tile at the card edges */
.cardArt::before { content:''; position:absolute; inset:0; background: var(--art, linear-gradient(135deg,#8B5CF6,#22D3EE)); opacity: 0.5; -webkit-mask: radial-gradient(72% 78% at 50% 44%, #000 0%, transparent 72%); mask: radial-gradient(72% 78% at 50% 44%, #000 0%, transparent 72%); transition: opacity var(--duration) var(--ease-premium); }
.card:hover .cardArt::before { opacity: 0.72; }
.cardArt::after { content:''; position:absolute; inset:0; background: radial-gradient(120% 80% at 50% 120%, rgba(0,0,0,.45), transparent 70%); }
.cardArtIcon { position: relative; z-index:1; display:grid; place-items:center; overflow: visible; transition: transform var(--duration) var(--ease-premium); }
/* overflow:visible lets each icon's glow/depth fade out softly instead of being
   clipped into a hard box at the SVG's bounding-box edge */
.cardArtIcon svg { width: 60px; height: 60px; display:block; overflow: visible; }
.card:hover .cardArtIcon { transform: scale(1.08); }
.cardArtBadge { position:absolute; top:10px; left:10px; z-index:1; font-family: var(--font-mono); font-size: 9px; letter-spacing:.1em; text-transform:uppercase; color:#fff; background: rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.18); backdrop-filter: blur(6px); padding: 4px 9px; border-radius: var(--radius-pill); max-width: calc(100% - 20px); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cardBody { display:flex; flex-direction:column; gap: 3px; padding: 14px 15px 15px; }
.cardName { font-family: var(--font-display); font-weight: 700; font-size: var(--text-lg); letter-spacing: 0.01em; }
.cardDesc { font-size: 12px; color: var(--muted-strong); line-height: 1.45; }
.cardFoot { display:flex; align-items:flex-end; justify-content:space-between; gap: var(--space-3); margin-top: 12px; }
.cardPrice { display:flex; flex-direction:column; gap: 2px; }
.cardPriceLabel { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.cardPriceVal { font-family: var(--font-display); font-weight: 700; font-size: var(--text-base); color: var(--brand-2); text-shadow: 0 0 14px rgba(34,211,238,.45); font-variant-numeric: tabular-nums; }
.cardHeart { display:grid; place-items:center; width: 34px; height: 34px; flex-shrink:0; border-radius: 10px; border: 1px solid var(--border-strong); background: rgba(255,255,255,.03); color: var(--muted-strong); cursor: pointer; transition: all var(--duration) var(--ease-premium); }
.cardHeart:hover { color: var(--neg); border-color: var(--neg-line); transform: scale(1.08); }
.cardHeart.on { color: #fff; background: var(--neg); border-color: var(--neg); box-shadow: 0 0 16px var(--neg-line); }
.cardHeart.on svg { fill: #fff; }
@media (prefers-reduced-motion: reduce) { .card { opacity:1; transform:none; animation:none; } }

/* Vitals tile */
.vitals { grid-column: span 2; grid-row: span 2; display:flex; flex-direction:column; gap: var(--space-4); padding: var(--space-6); border: 1px solid var(--brand-line); border-radius: var(--radius-lg); background: var(--brand-soft); box-shadow: 0 0 50px -24px var(--brand-glow), var(--card-shadow); }
@media (max-width: 520px) { .vitals { grid-column: span 1; grid-row: auto; } }
.vitalsHead { display:flex; align-items:center; justify-content:space-between; gap: var(--space-3); flex-wrap:wrap; }
.vitalsEyebrow { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--brand); }
.srcBadge { display:inline-flex; align-items:center; gap: 6px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; border-radius: var(--radius-pill); background: var(--surface); border: 1px solid var(--border); color: var(--muted-strong); }
.srcDot { width: 6px; height: 6px; border-radius: 50%; background: var(--brand); box-shadow: 0 0 8px var(--brand-glow); }
.vitalsBody { display:flex; align-items:center; gap: var(--space-6); flex-wrap: wrap; }
.recRing { position: relative; width: 132px; height: 132px; display:grid; place-items:center; flex-shrink:0; overflow: visible; }
.recRing[data-tone="good"]  { color: var(--pos); }
.recRing[data-tone="watch"] { color: var(--warn); }
.recRing[data-tone="low"]   { color: var(--neg); }
.recRing[data-tone="muted"] { color: var(--muted); }
/* soft colored aura so the glow fades smoothly instead of clipping into a box */
.recRing::before { content:''; position:absolute; inset:-18px; border-radius:50%; background: radial-gradient(closest-side, currentColor, transparent 70%); opacity:.32; filter: blur(14px); pointer-events:none; z-index:0; animation: recPulse 3.6s var(--ease) infinite; }
.recRing[data-tone="muted"]::before { opacity:.10; animation:none; }
@keyframes recPulse { 0%,100% { opacity:.26; } 50% { opacity:.44; } }
@media (prefers-reduced-motion: reduce) { .recRing::before { animation:none; } }
.recRing svg { position:absolute; inset:0; transform: rotate(-90deg); overflow: visible; z-index:1; }
.recTrack { fill:none; stroke: var(--track); stroke-width: 10; }
.recFill { fill:none; stroke: currentColor; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 700ms var(--ease-premium); filter: drop-shadow(0 0 4px currentColor) drop-shadow(0 0 13px currentColor); }
.recNum { position: relative; z-index:1; color: var(--fg); font-family: var(--font-display); font-weight: 600; font-size: 2.5rem; line-height: 1; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
.recUnit { font-size: var(--text-base); color: var(--muted-strong); }
.recCap { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
.vMetrics { display:flex; flex-direction:column; gap: var(--space-3); flex:1; min-width: 150px; }
.vRow { display:flex; align-items:baseline; justify-content:space-between; gap: var(--space-3); padding-bottom: var(--space-2); border-bottom: 1px solid var(--border); }
.vRow:last-child { border-bottom:0; }
.vLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.vVal { font-family: var(--font-display); font-weight: 600; font-size: var(--text-lg); font-variant-numeric: tabular-nums; }
.vVal em { font-family: var(--font-mono); font-style: normal; font-size: 11px; color: var(--muted); margin-left: 4px; }
.vitalsFoot { display:flex; align-items:center; justify-content:space-between; gap: var(--space-3); flex-wrap: wrap; }
.vitalsSync { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.vitalsEmpty { display:flex; flex-direction:column; gap: var(--space-3); justify-content:center; flex:1; }
.vitalsEmptyTitle { font-family: var(--font-display); font-weight: 600; font-size: var(--text-xl); letter-spacing: -0.02em; }
.vitalsEmptyBody { font-size: 13px; color: var(--muted-strong); line-height: 1.55; max-width: 42ch; }

/* Buttons */
.btn { display:inline-flex; align-items:center; justify-content:center; gap: var(--space-2); padding: 0.6rem var(--space-4); border-radius: var(--radius-md); font-size: var(--text-sm); font-family: var(--font-ui); font-weight: 600; cursor: pointer; border: 1px solid transparent; background: transparent; color: var(--fg); white-space: nowrap; transition: background var(--duration) var(--ease), border-color var(--duration) var(--ease), color var(--duration) var(--ease), filter var(--duration) var(--ease), box-shadow var(--duration) var(--ease); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-primary { background: var(--brand); color: var(--brand-ink); font-weight: 700; }
.btn-primary:hover:not(:disabled) { filter: brightness(1.08); box-shadow: 0 0 26px var(--brand-glow); }
.btn-ghost { color: var(--fg); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--border-strong); background: var(--surface); }
.btn-link { color: var(--muted-strong); padding: var(--space-2) var(--space-2); }
.btn-link:hover { color: var(--neg); }

/* Modal */
.overlay { position: fixed; inset:0; background: var(--overlay); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 1000; display:grid; place-items:center; padding: var(--space-4); animation: fade 200ms var(--ease-premium); }

<script>
/* ============================================================
 * Apps in the suite — one bento card each.
 * ============================================================ */
const APPS = [
  { file: 'ai-mentor.html',   name: 'JARVIS',       tag: 'Voice AI chief of staff · live briefing', icon: '🤖', wide: true },
  { file: 'peak.html',        name: 'PEAK TRACKER', tag: 'Daily readiness · energy curve',        icon: '🔆', wide: true },
  { file: 'peak-standalone.html', name: 'PEAK · STANDALONE', tag: 'Self-contained · share / download', icon: '📦', wide: true },
  { file: 'finance.html',     name: 'Finance',     tag: 'Net worth · subs · orders · wishlist', icon: '💰', wide: true },
  { file: 'gym.html',         name: 'Gym',         tag: 'Progressive overload coach',           icon: '🏋️', wide: true },
  { file: 'enhancers.html',   name: 'Enhancers',   tag: 'Supplements · stimulants · meds',       icon: '💊', wide: true },
  { file: 'food.html',        name: 'Food & Water', tag: 'Hydration target · daily macros',       icon: '🥤', wide: true },
  { file: 'fitband.html',     name: 'Fitness Band', tag: 'Recovery · sleep · strain · trends',     icon: '🔋', wide: true },
  { file: 'mentor.html',      name: 'Mentor',      tag: 'Nova · live chat + cozy thinking',       icon: '🌟', wide: true },
  { file: 'ai-avatar-2.html', name: 'AI Mentor',   tag: 'Nova · 3D avatar + animation kit',      icon: '🪐', wide: true },
  { file: 'creator.html',     name: 'Creator',     tag: 'Schedule · accounts · analytics',       icon: '🎬' },
  { file: 'goals.html',       name: 'Goals',       tag: 'Goals & streaks',                       icon: '🎯' },
  { file: 'progress.html',    name: 'Progress',    tag: 'Photos & measurements',                 icon: '📈' },
];

/* ============================================================
 * Theme (shared across the whole suite via patron_theme)
 * ============================================================ */
const THEMES = [
  { key: 'nocturne', label: 'Nocturne', swatch: '#8B7CFF' },
  { key: 'aurora', label: 'Aurora', swatch: 'linear-gradient(135deg,#8B7BFF,#4FE3D0)' },
  { key: 'daylight', label: 'Daylight', swatch: '#6A45FF' },
];
let currentTheme = (function(){ try { return localStorage.getItem('patron_theme') || 'nocturne'; } catch(e){ return 'nocturne'; } })();
if (!THEMES.some(t => t.key === currentTheme)) currentTheme = 'nocturne';
function applyTheme(name){
  if (!THEMES.some(t => t.key === name)) name = 'nocturne';
  currentTheme = name;
  document.documentElement.setAttribute('data-theme', name);
  try { localStorage.setItem('patron_theme', name); } catch(e){}
  render();
}
function themeSegHtml(){
  return '<div class="themeSeg" role="radiogroup" aria-label="Theme">'
    + THEMES.map(t => '<button type="button" class="themeBtn ' + (t.key === currentTheme ? 'themeBtnActive' : '') + '" data-action="theme" data-theme="' + t.key + '"><span class="themeSwatch" style="background:' + t.swatch + '"></span>' + t.label + '</button>').join('')
    + '</div>';
}

/* ============================================================
 * Shared health record — the suite-wide vitals bridge.
 * Whoop publishes it from the Whoop tab; this hub lets non-Whoop
 * users enter it manually (or tag it as Apple Watch). Supplements
 * reads it to drive its recovery/sleep recommendations.
 * ============================================================ */
const HEALTH_KEY = 'patron_health_v1';
const LEGACY_WHOOP_KEY = 'patron_whoop_data_v1';
function loadHealth(){
  try {
    let r = localStorage.getItem(HEALTH_KEY);
    if (r) { const d = JSON.parse(r); if (d && d.connected) return d; }
    r = localStorage.getItem(LEGACY_WHOOP_KEY);
    if (r) { const d = JSON.parse(r); if (d && d.connected) return Object.assign({ source: 'whoop' }, d); }
  } catch(e){}
  return null;
}
function saveHealth(d){ try { localStorage.setItem(HEALTH_KEY, JSON.stringify(d)); } catch(e){} }
function clearHealth(){ try { localStorage.removeItem(HEALTH_KEY); } catch(e){} }
let health = loadHealth();

/* ---- Live WHOOP sync via the /api serverless OAuth flow (deployed host only) ---- */
const ON_SERVER = location.protocol === 'http:' || location.protocol === 'https:';
let whoopStatus = { connected: false, checked: false };
async function syncWhoop(){
  if (!ON_SERVER) return;
  try {
    const r = await fetch('/api/whoop/data', { cache: 'no-store' });
    const j = await r.json();
    whoopStatus = { connected: !!j.connected, checked: true };
    if (j.connected) {
      health = { source: 'whoop', connected: true, ts: j.ts || Date.now(), recovery: j.recovery, sleepHours: j.sleepHours, sleepPerf: j.sleepPerf, sleepTargetHours: j.sleepTargetHours || 8, hrv: j.hrv, rhr: j.rhr, strain: j.strain };
      saveHealth(health);
    } else if (health && health.source === 'whoop') {
      clearHealth(); health = null; // token expired/disconnected — drop stale Whoop data
    }
  } catch (e) { whoopStatus = { connected: false, checked: true }; }
  render();
}

/* ---- Live Fitbit sync — same serverless OAuth pattern as Whoop ---- */
let fitbitStatus = { connected: false, checked: false };
async function syncFitbit(){
  if (!ON_SERVER) return;
  try {
    const r = await fetch('/api/fitbit/data', { cache: 'no-store' });
    const j = await r.json();
    fitbitStatus = { connected: !!j.connected, checked: true };
    if (j.connected) {
      health = { source: 'fitbit', connected: true, ts: j.ts || Date.now(), recovery: j.recovery, sleepHours: j.sleepHours, sleepPerf: j.sleepPerf, sleepTargetHours: j.sleepTargetHours || 8, bedtime: j.bedtime, wakeTime: j.wakeTime, hrv: j.hrv, rhr: j.rhr, strain: j.strain };
      saveHealth(health);
    } else if (health && health.source === 'fitbit') {
      clearHealth(); health = null; // token expired/disconnected — drop stale Fitbit data
    }
  } catch (e) { fitbitStatus = { connected: false, checked: true }; }
  render();
}

/* ---- Apple Health sync — an iPhone Shortcut pushes Health data to /api/apple,
   we read it back here. Only applies when Whoop/Fitbit aren't connected. ---- */
let appleStatus = { connected: false, checked: false };
async function syncApple(){
  if (!ON_SERVER) return;
  try {
    const r = await fetch('/api/apple', { cache: 'no-store' });
    const j = await r.json();
    appleStatus = { connected: !!j.connected, checked: true };
    if (j.connected && !whoopStatus.connected && !fitbitStatus.connected) {
      const incomingTs = j.ts || 0;
      const incomingSrc = (j.source === 'manual') ? 'manual' : 'apple';
      // Treat both shortcut sources (apple / manual) as the "pushed" record.
      if (!health || health.source === 'apple' || health.source === 'manual' || incomingTs > (health.ts || 0)) {
        health = { source: incomingSrc, connected: true, ts: j.ts || Date.now(), recovery: j.recovery, sleepHours: j.sleepHours, sleepPerf: j.sleepPerf, sleepTargetHours: j.sleepTargetHours || 8, bedtime: j.bedtime, wakeTime: j.wakeTime, hrv: j.hrv, rhr: j.rhr, strain: j.strain };
        saveHealth(health);
      }
    }
  } catch (e) { appleStatus = { connected: false, checked: true }; }
  render();
}

function sourceLabel(s){ return s === 'apple' ? 'Apple Watch' : s === 'manual' ? 'Manual' : s === 'fitbit' ? 'Fitbit' : 'Whoop'; }
function recTone(r){ if (r == null) return 'muted'; if (r >= 67) return 'good'; if (r >= 34) return 'watch'; return 'low'; }
function clamp01(x){ return Math.max(0, Math.min(1, x)); }
/* Estimated recovery/readiness (1–99) when the source gives none (Apple, Fitbit).
 * HRV is the main driver, then resting HR, then sleep. Rough population anchors —
 * a daily readiness estimate, not a medical score. Returns null if too little data. */
function estRecovery(h){
  if (!h) return null;
  if (h.recovery != null) return h.recovery;
  const parts = [], w = [];
  if (typeof h.hrv === 'number') { parts.push(clamp01((h.hrv - 20) / (90 - 20)) * 100); w.push(0.5); }
  if (typeof h.rhr === 'number') { parts.push(clamp01((80 - h.rhr) / (80 - 42)) * 100); w.push(0.25); }
  if (typeof h.sleepPerf === 'number') { parts.push(Math.min(100, h.sleepPerf)); w.push(0.25); }
  else if (typeof h.sleepHours === 'number') { parts.push(clamp01(h.sleepHours / (h.sleepTargetHours || 8)) * 100); w.push(0.25); }
  if (!parts.length) return null;
  const sw = w.reduce((a, b) => a + b, 0);
  let s = 0; for (let i = 0; i < parts.length; i++) s += parts[i] * w[i];
  return Math.max(1, Math.min(99, Math.round(s / sw)));
}
/* Subjective readiness (1–99) from morning self-ratings (1–5 each) — no band needed.
 * Modelled on athlete self-report tools (Hooper Index): sleep quality, energy,
 * soreness, stress, mood. Soreness & stress are "higher = worse" so they invert. */
function subjReadiness(s){
  if (!s) return null;
  const up = (v) => (v - 1) / 4 * 100;    // higher = better
  const down = (v) => (5 - v) / 4 * 100;  // higher = worse
  const parts = [], w = [];
  if (s.sleepQ)  { parts.push(up(s.sleepQ));    w.push(0.30); }
  if (s.energy)  { parts.push(up(s.energy));    w.push(0.25); }
  if (s.soreness){ parts.push(down(s.soreness));w.push(0.20); }
  if (s.stress)  { parts.push(down(s.stress));  w.push(0.15); }
  if (s.mood)    { parts.push(up(s.mood));       w.push(0.10); }
  if (!parts.length) return null;
  const sw = w.reduce((a, b) => a + b, 0);
  let x = 0; for (let i = 0; i < parts.length; i++) x += parts[i] * w[i];
  return Math.max(1, Math.min(99, Math.round(x / sw)));

/* ============================================================
 * Live ticker — collect every metric the suite currently knows
 * into a scrolling marquee. Each item: short label, value, unit,
 * a tone, and a small accent sparkline. Accent lines are decorative
 * (we don't yet log history) except where a real delta exists.
 * ============================================================ */
function sparkSvg(seed){
  // deterministic, gently-varying micro-line ending in a glowing dot
  const w = 46, h = 16, n = 6, pad = 2;
  const pts = [];
  for (let i = 0; i < n; i++){
    const t = (Math.sin(seed * 1.7 + i * 1.3) + Math.sin(seed * 0.6 + i * 0.7)) / 2; // -1..1, stable
    const x = pad + (i / (n - 1)) * (w - pad * 2);
    const y = pad + (1 - (t * 0.5 + 0.5)) * (h - pad * 2);
    pts.push([x, y]);
  }
  const d = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const last = pts[pts.length - 1];
  return '<svg class="tiSpark" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" aria-hidden>'
    + '<path d="' + d + '" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>'
    + '<circle cx="' + last[0].toFixed(1) + '" cy="' + last[1].toFixed(1) + '" r="2.1" fill="currentColor" style="filter:drop-shadow(0 0 4px currentColor)"/></svg>';
}
function tickerMetrics(){
  const out = [];
  const add = (label, value, unit, tone, delta) => out.push({ label, value, unit: unit || '', tone: tone || 'brand', delta: delta || '' });
  const h = health;
  if (h){
    { const rec = estRecovery(h); if (rec != null) add('REC', Math.round(rec), '%', recTone(rec)); }
    if (h.sleepHours != null){ const hh = Math.floor(h.sleepHours), mm = Math.round((h.sleepHours - hh) * 60); add('SLP', hh + 'h' + String(mm).padStart(2,'0'), '', h.sleepPerf != null ? (h.sleepPerf >= 85 ? 'good' : h.sleepPerf >= 60 ? 'watch' : 'low') : 'brand'); }
    if (h.strain != null) add('STR', (Math.round(h.strain * 10) / 10).toFixed(1), '', 'brand');
    if (h.hrv != null) add('HRV', Math.round(h.hrv), 'ms', 'good');
    if (h.rhr != null) add('RHR', Math.round(h.rhr), 'bpm', 'brand');
  }
  try {
    const fin = lsGet('finance_standalone_v1');
    if (fin && Array.isArray(fin.accounts) && fin.accounts.length){ const nw = fin.accounts.reduce((a,x)=>a+(Number(x.amountCHF)||0),0); add('NET', 'CHF ' + fmtNum(nw), '', 'good'); }
    const wat = lsGet('water_standalone_v1');
    if (wat && wat.logs){ const n = wat.logs[localDateKey()] || 0; add('H2O', String(n), n === 1 ? 'drink' : 'drinks', 'brand'); }
    const sup = lsGet('supplements_standalone_v1');
    if (sup && Array.isArray(sup.items) && sup.items.length){ const tk = (sup.taken && sup.taken[activeDateKey()]) || {}; const n = sup.items.filter(i => tk[i.id]).length; add('SUP', n + '/' + sup.items.length, '', n >= sup.items.length ? 'good' : 'brand'); }
  } catch(e){}
  return out;
}
function tickerHtml(){
  const items = tickerMetrics();
  if (!items.length){
    return '<div class="ticker"><div class="tickerLead"><span class="tickerPulse"></span>' + esc(brandName()) + ' · Live</div>'
      + '<div class="tickerViewport"><div class="tickerTrack" style="animation:none;padding-left:var(--space-5)">'
      + '<span class="tickerItem" style="border:0"><span class="tiLabel">No data yet — add vitals to go live</span></span>'
      + '</div></div></div>';

    + (m.delta ? '<span class="tiDelta">' + esc(m.delta) + '</span>' : '')
    + sparkSvg(i + 1) + '</span>';
  const seq = items.map(chip).join('');

  return '<div class="ticker"><div class="tickerLead"><span class="tickerPulse"></span>' + esc(brandName()) + ' · Live</div>'
    + '<div class="tickerViewport"><div class="tickerTrack" style="animation-duration:' + dur + 's">'
    + seq + seq + '</div></div></div>';
}

  } else if (src === 'fitbit') {

        + '<div class="srcActions"><button type="button" class="btn btn-link spacer" data-action="fitbit-disconnect">disconnect Fitbit</button><button type="button" class="btn btn-primary" data-action="fitbit-sync">Sync now</button></div>';

      + '<div class="fieldGrid">'

function openVitals(){
  ui.modalOpen = true;
  ui.draftSource = (health && health.source) ? health.source : 'manual';
  if (ui.draftSource === 'whoop') ui.draftSource = 'whoop';
  renderModal();
}
function saveVitals(){
  const num = (id) => { const el = document.getElementById(id); if (!el || el.value === '') return null; const n = Number(el.value); return isFinite(n) ? n : null; };
  const str = (id) => { const el = document.getElementById(id); return el && el.value ? el.value : null; };

  // ---- Manual self-report (no band): ratings → readiness score ----
  if (ui.draftSource === 'manual') {
    const rate = (id) => { const n = num(id); return (n != null && n >= 1 && n <= 5) ? n : null; };
    const sleepQ = rate('f-sq'), energy = rate('f-en'), mood = rate('f-mo'), soreness = rate('f-so'), stress = rate('f-st');
    const bedtime = str('f-bed'), wakeTime = str('f-wake');
    let sleepHours = num('f-sleep');
    if (sleepHours == null && bedtime && wakeTime) {
      const [bh, bm] = bedtime.split(':').map(Number);
      const [wh, wm] = wakeTime.split(':').map(Number);
      let mins = (wh * 60 + wm) - (bh * 60 + bm);
      if (mins <= 0) mins += 24 * 60;
      sleepHours = Math.round((mins / 60) * 10) / 10;
    }
    const rhr = num('f-rhr');
    const target = num('f-target') || 8;
    const readiness = subjReadiness({ sleepQ, energy, mood, soreness, stress });
    if (readiness == null && sleepHours == null && rhr == null) { alert('Rate at least how you feel — or enter sleep / bed + wake times.'); return; }
    const sleepPerf = sleepHours != null ? Math.round(Math.min(100, (sleepHours / target) * 100)) : null;
    health = { source: 'manual', connected: true, ts: Date.now(), recovery: readiness, subjective: readiness != null,
      sleepQ, energy, mood, soreness, stress,
      sleepHours, sleepPerf, sleepTargetHours: target, bedtime, wakeTime, hrv: null, rhr, strain: null };
    saveHealth(health);
    ui.modalOpen = false;
    render();
    return;
  }

  const recovery = num('f-rec');
  const bedtime = str('f-bed');
  const wakeTime = str('f-wake');
  // Hours-asleep priority: explicit field → otherwise derive from bed/wake times (wake assumed next morning if earlier than bed).
  let sleepHours = num('f-sleep');
  if (sleepHours == null && bedtime && wakeTime){
    const [bh, bm] = bedtime.split(':').map(Number);
    const [wh, wm] = wakeTime.split(':').map(Number);
    let mins = (wh * 60 + wm) - (bh * 60 + bm);
    if (mins <= 0) mins += 24 * 60;
    sleepHours = Math.round((mins / 60) * 10) / 10;
  }
  const hrv = num('f-hrv');
  const rhr = num('f-rhr');
  const target = num('f-target') || 8;
  if (recovery == null && sleepHours == null && hrv == null && rhr == null) { alert('Enter at least one value (recovery, sleep, or bed + wake times).'); return; }
  const sleepPerf = sleepHours != null ? Math.round(Math.min(100, (sleepHours / target) * 100)) : null;
  health = { source: ui.draftSource, connected: true, ts: Date.now(), recovery, sleepHours, sleepPerf, sleepTargetHours: target, bedtime, wakeTime, hrv, rhr, strain: null };
  saveHealth(health);
  ui.modalOpen = false;
  render();
}

 * Events

/* ============================================================
 * Onboarding / profile modal
 * ============================================================ */
function draftFromProfile(){
  const p = profile || {};
  const units = p.units === 'imperial' ? 'imperial' : 'metric';
  const h = (p.heightCm == null || p.heightCm === '') ? '' : (units === 'imperial' ? Math.round(p.heightCm / 2.54) : Math.round(p.heightCm));
  const w = (p.weightKg == null || p.weightKg === '') ? '' : (units === 'imperial' ? Math.round(p.weightKg / 0.45359237) : p.weightKg);
  return {
    name: p.name || '', age: p.age != null ? String(p.age) : '', sex: p.sex || '', units,
    height: h === '' ? '' : String(h), weight: w === '' ? '' : String(w),
    workouts: p.workoutsPerWeek != null && p.workoutsPerWeek !== '' ? String(p.workoutsPerWeek) : '',
    level: p.gymLevel || '', goal: p.goal || '',
    caffeine: p.caffeineMgPerDay != null && p.caffeineMgPerDay !== '' ? String(p.caffeineMgPerDay) : '',
  };
}
function openProfile(){ ui.profileDraft = draftFromProfile(); ui.profileOpen = true; ui.modalOpen = false; renderModal(); }
function profileModalHtml(){
  const d = ui.profileDraft || draftFromProfile();
  const imperial = d.units === 'imperial';
  const isEdit = !!profile;
  const sel = (key, opts) => '<select class="fieldInput" data-pf="' + key + '">'
    + '<option value=""' + (d[key] === '' ? ' selected' : '') + '>—</option>'
    + opts.map(o => '<option value="' + o[0] + '"' + (d[key] === o[0] ? ' selected' : '') + '>' + o[1] + '</option>').join('') + '</select>';
  const inp = (key, type, ph, attrs) => '<input class="fieldInput" type="' + type + '" data-pf="' + key + '" placeholder="' + esc(ph) + '" value="' + esc(d[key]) + '" ' + (attrs || '') + ' />';
  const field = (label, inner) => '<div class="field"><label class="fieldLabel">' + label + '</label>' + inner + '</div>';
  const body = '<div class="fieldGrid">'
    + '<div class="field fieldFull"><label class="fieldLabel">Name</label>' + inp('name', 'text', 'Your name', 'autocomplete="name"') + '</div>'
    + field('Age', inp('age', 'number', '—', 'min="0" max="120" inputmode="numeric"'))
    + field('Sex', sel('sex', [['M', 'Male'], ['F', 'Female']]))
    + field('Units', sel('units', [['metric', 'Metric (cm/kg)'], ['imperial', 'Imperial (in/lb)']]))
    + field('Height (' + (imperial ? 'in' : 'cm') + ')', inp('height', 'number', imperial ? '70' : '178', 'min="0" inputmode="numeric"'))
    + field('Weight (' + (imperial ? 'lb' : 'kg') + ')', inp('weight', 'number', imperial ? '170' : '77', 'min="0" step="0.1" inputmode="decimal"'))
    + field('Workouts / week', inp('workouts', 'number', '4', 'min="0" max="14" inputmode="numeric"'))
    + field('Training level', sel('level', [['beginner', 'Beginner'], ['intermediate', 'Intermediate'], ['advanced', 'Advanced']]))
    + field('Primary goal', sel('goal', [['cut', 'Cut'], ['bulk', 'Bulk'], ['recomp', 'Recomp'], ['maintain', 'Maintain'], ['general_health', 'General health']]))
    + field('Caffeine mg/day', inp('caffeine', 'number', 'optional', 'min="0" max="1000" step="10" inputmode="numeric"'))
    + '</div>';
  return '<div class="overlay" data-action="close-profile"><div class="panel" data-stop="1">'
    + '<div class="panelHead"><div><div class="panelEyebrow">' + (isEdit ? 'Your profile' : 'Welcome') + '</div><h2 class="panelTitle">' + (isEdit ? 'Edit profile' : 'Set up your dashboard') + '</h2></div>'
    + (isEdit ? '<button type="button" class="panelClose" data-action="close-profile">×</button>' : '') + '</div>'
    + (isEdit ? '' : '<p class="panelNote" style="border-color:var(--brand-line)">Tell the suite a little about you — your name personalizes it, and your stats pre-fill the apps (weight → Water, age/goal/training → Supplements). Stored only in this browser; edit anytime.</p>')
    + body
    + '<div class="panelActions"><button type="button" class="btn ' + (isEdit ? 'btn-ghost' : 'btn-link') + '" data-action="close-profile">' + (isEdit ? 'Cancel' : 'Skip for now') + '</button>'
    + '<button type="button" class="btn btn-primary" data-action="save-profile">' + (isEdit ? 'Save' : 'Save &amp; start') + '</button></div></div></div>';
}
function saveProfile(){
  const d = ui.profileDraft || {};
  const name = (d.name || '').trim();
  if (!name) { alert('Add your name to continue (or Skip for now).'); return; }
  const units = d.units === 'imperial' ? 'imperial' : 'metric';
  const num = (x) => { if (x === '' || x == null) return ''; const n = Number(x); return isFinite(n) ? n : ''; };
  const hRaw = num(d.height), wRaw = num(d.weight);
  const heightCm = hRaw === '' ? '' : (units === 'imperial' ? Math.round(hRaw * 2.54) : Math.round(hRaw));
  const weightKg = wRaw === '' ? '' : (units === 'imperial' ? Math.round(wRaw * 0.45359237 * 10) / 10 : wRaw);
  profile = {
    name, age: num(d.age), sex: d.sex || '', heightCm, weightKg, units,
    workoutsPerWeek: num(d.workouts), gymLevel: d.level || '', goal: d.goal || '',
    caffeineMgPerDay: num(d.caffeine), onboarded: true, ts: Date.now(),
  };
  saveProfileObj(profile);
  markOnboardSeen();
  ui.profileOpen = false;
  render();
}

document.addEventListener('click', e => {
  const stop = e.target.closest('[data-stop]');
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.getAttribute('data-action');
  if (action === 'theme') { applyTheme(btn.getAttribute('data-theme')); return; }
  if (action === 'open-vitals') { openVitals(); return; }
  if (action === 'open-profile') { openProfile(); return; }
  if (action === 'close-profile') { if (!stop || btn.tagName === 'BUTTON') { ui.profileOpen = false; markOnboardSeen(); renderModal(); } return; }
  if (action === 'save-profile') { saveProfile(); return; }
  if (action === 'close-vitals') { if (!stop || btn.tagName === 'BUTTON') { ui.modalOpen = false; renderModal(); } return; }
  if (action === 'src') { ui.draftSource = btn.getAttribute('data-src'); renderModal(); return; }
  if (action === 'save-vitals') { saveVitals(); return; }
  if (action === 'clear-vitals') { if (confirm('Clear today’s vitals from the suite?')) { clearHealth(); health = null; ui.modalOpen = false; render(); } return; }
  if (action === 'whoop-sync') { syncWhoop(); return; }
  if (action === 'whoop-disconnect') {
    fetch('/api/whoop/logout').catch(()=>{}).then(() => {
      whoopStatus = { connected: false, checked: true };
      if (health && health.source === 'whoop') { clearHealth(); health = null; }
      ui.modalOpen = false; render();
    });
    return;
  }
  if (action === 'fitbit-sync') { syncFitbit(); return; }
  if (action === 'fitbit-disconnect') {
    fetch('/api/fitbit/logout').catch(()=>{}).then(() => {
      fitbitStatus = { connected: false, checked: true };
      if (health && health.source === 'fitbit') { clearHealth(); health = null; }
      ui.modalOpen = false; render();
    });
    return;
  }
});

// Profile-form fields → draft (text/number on input keeps caret; selects on change; units re-renders to relabel).
// Lazy-init the draft so first-run typing is never dropped.
document.addEventListener('input', e => {
  const t = e.target; if (!(t && t.dataset && t.dataset.pf)) return;
  if (!ui.profileDraft) ui.profileDraft = draftFromProfile();
  ui.profileDraft[t.dataset.pf] = t.value;
});
document.addEventListener('change', e => {
  const t = e.target; if (!(t && t.dataset && t.dataset.pf)) return;
  if (!ui.profileDraft) ui.profileDraft = draftFromProfile();
  if (t.dataset.pf === 'units') {
    // Switching units relabels AND converts whatever's already typed, so the numbers stay sensible.
    const d = ui.profileDraft, toImp = t.value === 'imperial';
    const conv = (v, f, dp) => (v === '' || v == null || !isFinite(Number(v))) ? v : String(Math.round(Number(v) * f * (dp ? 10 : 1)) / (dp ? 10 : 1));
    if (toImp) { d.height = conv(d.height, 1/2.54, 0); d.weight = conv(d.weight, 1/0.45359237, 0); }
    else       { d.height = conv(d.height, 2.54, 0);   d.weight = conv(d.weight, 0.45359237, 1); }
    d.units = t.value;
    renderModal();
    return;
  }
  ui.profileDraft[t.dataset.pf] = t.value;
});

// Reflect theme / vitals changes made in sibling tabs.
window.addEventListener('storage', e => {
  if (e.key === 'patron_theme' && e.newValue) { applyTheme(e.newValue); return; }
  if (e.key === HEALTH_KEY || e.key === LEGACY_WHOOP_KEY || e.key === null) { health = loadHealth(); render(); }
});

// Auto-open onboarding ONLY for a brand-new user (no saved profile AND never seen
// before). Once completed or dismissed, markOnboardSeen() stops it reappearing on refresh.
if (!profile && !onboardSeen()) { ui.profileDraft = draftFromProfile(); ui.profileOpen = true; }
applyTheme(currentTheme);

// On a deployed host: pick up the OAuth return + pull the latest Whoop / Fitbit vitals.
(function bootVitals(){
  if (!ON_SERVER) return;
  try {
    const q = new URLSearchParams(location.search);
    const w = q.get('whoop'), f = q.get('fitbit');
    if (w || f) {
      history.replaceState(null, '', location.pathname);
      if (w === 'error' || w === 'denied') alert('Whoop connection didn’t complete. Check your WHOOP_CLIENT_ID / SECRET and the registered redirect URL (see WHOOP_SETUP.md), then try again.');
      if (f === 'error' || f === 'denied') alert('Fitbit connection didn’t complete. Check your FITBIT_CLIENT_ID / SECRET and the registered redirect URL (see FITBIT_SETUP.md), then try again.');
    }
  } catch (e) {}
  syncWhoop();
  syncFitbit();
  syncApple();
})();
