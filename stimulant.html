<style>
:root{
  color-scheme: dark;
  --bg:#0F0F23; --bg-elevated:#1A1A3A;
  --surface:rgba(139,92,246,0.06); --surface-2:rgba(139,92,246,0.11);
  --fg:#F8FAFC; --muted:rgba(226,232,255,0.52); --muted-strong:rgba(226,232,255,0.80);
  --border:rgba(124,58,237,0.22); --border-strong:rgba(167,139,250,0.45);
  --brand:#8B5CF6; --brand-2:#22D3EE; --brand-ink:#0B0420;
  --brand-soft:rgba(139,92,246,0.16); --brand-line:rgba(139,92,246,0.40); --brand-glow:rgba(139,92,246,0.65);
  --pos:#22D3EE; --neg:#F472B6; --warn:#FBBF24; --danger:#FB5775;
  --card-shadow:0 1px 0 rgba(167,139,250,0.08) inset, 0 22px 50px -28px rgba(0,0,0,0.95);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-16:4rem;
  --radius-sm:10px; --radius-md:13px; --radius-lg:18px; --radius-pill:999px;
  --text-xs:.75rem;--text-sm:.875rem;--text-base:1rem;--text-lg:1.125rem;--text-xl:1.375rem;--text-3xl:2.5rem;
  --ease:cubic-bezier(.2,.8,.2,1); --ease-premium:cubic-bezier(.16,1,.3,1); --duration:200ms;
  --font-display:'Orbitron'; --font-ui:'Exo 2'; --font-mono:'JetBrains Mono';
}
*{box-sizing:border-box} html,body{margin:0;padding:0}
body{ background:var(--bg); color:var(--fg); font-family:var(--font-ui),-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; -webkit-font-smoothing:antialiased; }
.page{ position:relative; min-height:100dvh; padding:var(--space-8) var(--space-5) var(--space-16); isolation:isolate; }
.page::before{ content:''; position:absolute; inset:0; pointer-events:none; z-index:-1; background:radial-gradient(58% 42% at 82% 6%, rgba(139,92,246,0.22), transparent 70%), radial-gradient(48% 38% at 12% 92%, rgba(34,211,238,0.12), transparent 72%); }
.shell{ max-width:760px; margin:0 auto; }

.header{ display:flex; align-items:flex-end; justify-content:space-between; gap:var(--space-4); margin-bottom:var(--space-6); flex-wrap:wrap; }
.title{ font-family:var(--font-display); font-weight:800; font-size:var(--text-3xl); line-height:1; letter-spacing:.03em; text-transform:uppercase; margin:0; background:linear-gradient(120deg,#fff 35%,var(--brand-2) 75%,var(--brand)); -webkit-background-clip:text; background-clip:text; color:transparent; filter:drop-shadow(0 0 20px rgba(34,211,238,.4)); }
.subtitle{ font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.18em; color:var(--muted); margin:6px 0 0; }
.backLink{ display:inline-flex; align-items:center; gap:6px; padding:7px 14px; background:var(--brand-soft); border:1px solid var(--brand-line); border-radius:var(--radius-pill); color:var(--brand-2); font-size:var(--text-xs); font-weight:600; text-decoration:none; transition:border-color var(--duration) var(--ease-premium); }
.backLink:hover{ border-color:var(--brand-2); }

.card{ position:relative; border:1px solid var(--border); border-radius:var(--radius-lg); background:var(--bg-elevated); box-shadow:var(--card-shadow); padding:var(--space-5); margin-bottom:var(--space-4); }
.eyebrow{ font-family:var(--font-mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--brand-2); margin:0 0 var(--space-3); display:flex; align-items:center; gap:8px; }
.eyebrow::before{ content:''; width:22px; height:1px; background:linear-gradient(90deg,var(--brand-2),transparent); }

/* Hero status */
.hero{ overflow:hidden; }
.heroTop{ display:flex; align-items:center; justify-content:space-between; gap:var(--space-4); flex-wrap:wrap; }
.heroNum{ font-family:var(--font-display); font-weight:800; font-size:54px; line-height:1; font-variant-numeric:tabular-nums; }
.heroNum small{ font-family:var(--font-ui); font-size:18px; color:var(--muted); font-weight:500; margin-left:4px; }
.statusChip{ display:inline-flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase; padding:8px 14px; border-radius:var(--radius-pill); border:1px solid var(--brand-line); background:var(--brand-soft); color:var(--brand-2); }
.statusChip .dot{ width:8px;height:8px;border-radius:50%; background:currentColor; box-shadow:0 0 10px currentColor; }
.statusChip[data-tone="warn"]{ color:var(--warn); border-color:rgba(251,191,36,.4); background:rgba(251,191,36,.1); }
.statusChip[data-tone="danger"]{ color:var(--danger); border-color:rgba(251,87,117,.45); background:rgba(251,87,117,.12); }
.statusChip[data-tone="muted"]{ color:var(--muted-strong); border-color:var(--border); background:var(--surface); }

.insightRow{ display:flex; gap:var(--space-3); flex-wrap:wrap; margin-top:var(--space-5); }
.insight{ flex:1; min-width:120px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:12px 14px; }
.insightLabel{ font-family:var(--font-mono); font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); display:flex; align-items:center; gap:6px; }
.insightVal{ font-family:var(--font-display); font-weight:700; font-size:var(--text-lg); margin-top:4px; font-variant-numeric:tabular-nums; }
.insightSub{ font-size:11px; color:var(--muted-strong); margin-top:2px; }
.peakC{ color:var(--brand-2); } .crashC{ color:var(--warn); } .clearC{ color:var(--muted-strong); }

.note{ margin-top:var(--space-4); font-size:13px; line-height:1.5; padding:12px 14px; border-radius:var(--radius-md); border-left:3px solid var(--brand-line); background:var(--brand-soft); color:var(--muted-strong); }
.note.warn{ border-color:var(--warn); background:rgba(251,191,36,.08); }
.note.danger{ border-color:var(--danger); background:rgba(251,87,117,.1); color:#ffd9e2; }
.note b{ color:var(--fg); font-weight:600; }

/* Chart */
.chartWrap{ margin-top:var(--space-5); }
.chart{ width:100%; height:120px; display:block; overflow:visible; }
.chartAxis{ display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:9px; color:var(--muted); margin-top:6px; letter-spacing:.08em; }

/* Daily limit bar */
.limitHead{ display:flex; align-items:baseline; justify-content:space-between; gap:var(--space-3); margin-bottom:10px; }
.limitNum{ font-family:var(--font-display); font-weight:700; font-size:var(--text-xl); font-variant-numeric:tabular-nums; }
.limitTarget{ color:var(--muted); font-size:var(--text-sm); }
.bar{ height:10px; border-radius:var(--radius-pill); background:rgba(255,255,255,.06); overflow:hidden; }
.barFill{ height:100%; border-radius:var(--radius-pill); background:linear-gradient(90deg,var(--brand),var(--brand-2)); transition:width .5s var(--ease-premium); box-shadow:0 0 12px var(--brand-glow); }
.barFill.over{ background:linear-gradient(90deg,var(--warn),var(--danger)); box-shadow:0 0 14px rgba(251,87,117,.5); }

/* Log button + search */
.logBtn{ width:100%; appearance:none; border:0; cursor:pointer; font-family:var(--font-display); font-weight:700; letter-spacing:.04em; text-transform:uppercase; font-size:15px; color:#fff; background:linear-gradient(120deg,var(--brand),var(--brand-2)); padding:16px; border-radius:var(--radius-md); box-shadow:0 0 24px -4px var(--brand-glow); transition:filter var(--duration) var(--ease-premium), transform var(--duration) var(--ease-premium); }
.logBtn:hover{ filter:brightness(1.08); transform:translateY(-1px); }
.searchRow{ position:relative; margin-bottom:var(--space-3); }
.search{ width:100%; appearance:none; background:rgba(0,0,0,.3); border:1px solid var(--border-strong); border-radius:var(--radius-md); color:var(--fg); font-family:inherit; font-size:15px; padding:13px 14px 13px 40px; outline:none; transition:border-color var(--duration) var(--ease-premium), box-shadow var(--duration) var(--ease-premium); }
.search:focus{ border-color:var(--brand-line); box-shadow:0 0 0 3px var(--brand-soft); }
.searchIcon{ position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
.quickRow{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:var(--space-3); }
.quickChip{ appearance:none; cursor:pointer; font-family:inherit; font-size:13px; font-weight:600; color:var(--brand-2); background:var(--brand-soft); border:1px solid var(--brand-line); border-radius:var(--radius-pill); padding:8px 14px; transition:all var(--duration) var(--ease-premium); }
.quickChip:hover{ background:rgba(34,211,238,.14); border-color:var(--brand-2); }

.drinkList{ list-style:none; margin:0; padding:0; max-height:340px; overflow-y:auto; display:flex; flex-direction:column; gap:7px; }
.drinkRow{ display:flex; align-items:center; justify-content:space-between; gap:var(--space-3); padding:11px 13px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); cursor:pointer; transition:border-color var(--duration) var(--ease-premium), background var(--duration) var(--ease-premium); }
.drinkRow:hover{ border-color:var(--brand-line); background:var(--surface-2); }
.drinkName{ font-size:14px; font-weight:600; }
.drinkCat{ font-family:var(--font-mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
.drinkMg{ font-family:var(--font-display); font-weight:700; color:var(--brand-2); font-variant-numeric:tabular-nums; white-space:nowrap; }
.drinkMg small{ font-family:var(--font-ui); color:var(--muted); font-weight:400; font-size:11px; }
.emptyText{ font-size:13px; color:var(--muted); padding:10px 2px; }

/* Custom add */
.addForm{ display:flex; gap:8px; flex-wrap:wrap; }
.input{ flex:1; min-width:120px; appearance:none; background:rgba(0,0,0,.3); border:1px solid var(--border-strong); border-radius:var(--radius-md); color:var(--fg); font-family:inherit; font-size:15px; padding:12px 13px; outline:none; }
.input:focus{ border-color:var(--brand-line); }
.input.mg{ flex:0 0 110px; }
.addBtn{ appearance:none; cursor:pointer; font-family:var(--font-display); font-weight:700; text-transform:uppercase; font-size:13px; letter-spacing:.04em; color:#fff; background:var(--brand); border:0; border-radius:var(--radius-md); padding:0 18px; box-shadow:0 0 18px -4px var(--brand-glow); }
.addBtn:hover{ filter:brightness(1.1); }

/* Today log */
.logList{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px; }
.logItem{ display:flex; align-items:center; gap:var(--space-3); padding:11px 13px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); }
.logTime{ font-family:var(--font-mono); font-size:11px; color:var(--brand-2); white-space:nowrap; }
.logName{ flex:1; font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.logMg{ font-family:var(--font-display); font-weight:700; font-variant-numeric:tabular-nums; }
.delBtn{ appearance:none; background:transparent; border:1px solid var(--border); color:var(--muted); width:30px; height:30px; border-radius:9px; cursor:pointer; flex-shrink:0; font-size:15px; line-height:1; }
.delBtn:hover{ color:var(--danger); border-color:var(--neg); }

.toast{ position:fixed; left:50%; bottom:28px; transform:translate(-50%,18px); background:var(--bg-elevated); border:1px solid var(--brand-line); color:var(--brand-2); font-family:var(--font-mono); font-size:12.5px; letter-spacing:.04em; padding:12px 18px; border-radius:12px; opacity:0; pointer-events:none; transition:.28s var(--ease-premium); box-shadow:0 12px 40px rgba(34,211,238,.18); max-width:90vw; z-index:50; }
.toast.show{ opacity:1; transform:translate(-50%,0); }
@media (prefers-reduced-motion:reduce){ .barFill{ transition:none; } }

<script>
/* ============================================================
 * Stimulant (caffeine) tracker.
 * Pharmacokinetics: one-compartment model with first-order
 * absorption — predicts peak (Tmax), comedown and clearance,
 * personalised from the suite profile (weight, sex, age).
 * ============================================================ */

/* ---------- profile / health ---------- */
function readLS(k){ try{ const r=localStorage.getItem(k); return r?JSON.parse(r):null; }catch(e){ return null; } }
function profile(){ return readLS('patron_profile_v1'); }
function health(){ try{ const d=readLS('patron_health_v1'); return (d&&d.connected)?d:null; }catch(e){ return null; } }

/* ---------- pharmacokinetics ---------- */
const KA = 4.0;               // /h absorption rate → Tmax ≈ 50 min
function halfLifeH(){
  let hl = 5;                 // healthy-adult average
  const p = profile();
  if(p){
    if(p.sex==='F') hl *= 1.05;            // slightly slower clearance on average
    if(typeof p.age==='number'){ if(p.age>=60) hl*=1.12; else if(p.age>0&&p.age<18) hl*=1.05; }
  }
  return hl;
}
function ke(){ return Math.LN2 / halfLifeH(); }
function vd(){ const p=profile(); const wt=(p&&typeof p.weightKg==='number'&&p.weightKg>0)?p.weightKg:75; return 0.6*wt; } // L
function tmaxH(){ const ka=KA,k=ke(); return Math.log(ka/k)/(ka-k); }
// mg of caffeine in the body, from a single dose, h hours after intake
function doseAmount(mg,h){ if(h<0)return 0; const ka=KA,k=ke(); if(Math.abs(ka-k)<1e-9)return 0; const a=mg*ka/(ka-k)*(Math.exp(-k*h)-Math.exp(-ka*h)); return Math.max(0,a); }
// total body caffeine (mg) at time tMs given all logs
function bodyAt(tMs){ return state.logs.reduce((s,l)=>s+doseAmount(l.mg,(tMs-l.t)/3600000),0); }

/* personalised daily ceiling (FDA 400 mg, scaled down for lighter people) */
function dailyLimit(){ const p=profile(); const wt=(p&&p.weightKg)?p.weightKg:75; return Math.max(250, Math.min(400, Math.round(6*wt/10)*10)); }

/* ---------- beverage database ---------- */
const DB = [
  // Coffee
  ['Espresso (single)',63,'coffee'],['Double espresso',126,'coffee'],['Brewed coffee (8 oz)',95,'coffee'],
  ['Brewed coffee (12 oz)',140,'coffee'],['Drip coffee (16 oz)',190,'coffee'],['Cold brew (16 oz)',205,'coffee'],
  ['Nitro cold brew (16 oz)',280,'coffee'],['Americano',154,'coffee'],['Latte',126,'coffee'],['Cappuccino',126,'coffee'],
  ['Flat white',130,'coffee'],['Mocha',152,'coffee'],['Instant coffee (8 oz)',62,'coffee'],['Decaf coffee (8 oz)',3,'coffee'],
  // Tea
  ['Black tea',47,'tea'],['Green tea',28,'tea'],['Matcha (1 tsp)',70,'tea'],['White tea',15,'tea'],['Oolong tea',38,'tea'],
  ['Chai latte',50,'tea'],['Bottled iced tea',25,'tea'],['Yerba mate',85,'tea'],
  // Energy
  ['Red Bull (8.4 oz)',80,'energy'],['Red Bull (12 oz)',114,'energy'],['Monster (16 oz)',160,'energy'],
  ['Monster Ultra (16 oz)',140,'energy'],['Bang (16 oz)',300,'energy'],['Celsius (12 oz)',200,'energy'],
  ['Rockstar (16 oz)',160,'energy'],['Reign (16 oz)',300,'energy'],['Prime Energy (12 oz)',200,'energy'],
  ['5-Hour Energy',200,'energy'],['G Fuel (1 scoop)',150,'energy'],
  // Soda
  ['Coca-Cola (12 oz)',34,'soda'],['Diet Coke (12 oz)',46,'soda'],['Pepsi (12 oz)',38,'soda'],
  ['Mountain Dew (12 oz)',54,'soda'],['Dr Pepper (12 oz)',41,'soda'],
  // Other
  ['Pre-workout (1 scoop)',200,'other'],['Caffeine pill (100 mg)',100,'other'],['Caffeine pill (200 mg)',200,'other'],
  ['Dark chocolate (1 oz)',24,'other'],['Hot chocolate',5,'other'],['Espresso martini',100,'other'],
].map(d=>({name:d[0],mg:d[1],cat:d[2]}));

/* ---------- state ---------- */
const LS='stimulant_standalone_v1';
function load(){ const r=readLS(LS); return { logs:(r&&Array.isArray(r.logs))?r.logs:[], custom:(r&&Array.isArray(r.custom))?r.custom:[] }; }
function save(){ try{ localStorage.setItem(LS, JSON.stringify(state)); }catch(e){} if(window.PatronDB&&PatronDB.isCloud())PatronDB.set('stimulant', state); }
let state = load();
let query = '';
const NOW = ()=>Date.now();

/* ---------- helpers ---------- */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtClock(ms){ const d=new Date(ms); let h=d.getHours(); const m=d.getMinutes(); const ap=h<12?'am':'pm'; h=h%12===0?12:h%12; return h+':'+String(m).padStart(2,'0')+ap; }
function todayKey(t){ const d=new Date(t); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function logsToday(){ const k=todayKey(NOW()); return state.logs.filter(l=>todayKey(l.t)===k); }
function mgToday(){ return logsToday().reduce((s,l)=>s+l.mg,0); }
function allDrinks(){ return state.custom.map(c=>({name:c.name,mg:c.mg,cat:'custom'})).concat(DB); }

/* next occurrence of the user's bedtime (HH:MM) after now, else null */
function nextBedtime(){ const h=health(); if(!h||!h.bedtime)return null; const [hh,mm]=String(h.bedtime).split(':').map(Number); if(!isFinite(hh))return null; const d=new Date(); d.setHours(hh,mm||0,0,0); if(d.getTime()<=NOW())d.setDate(d.getDate()+1); return d.getTime(); }

/* timing insight for the most-recent dose */
function timing(){
  if(!state.logs.length) return null;
  const last = state.logs.reduce((a,b)=>a.t>b.t?a:b);
  const peakMs = last.t + tmaxH()*3600000;
  const peakTotal = bodyAt(peakMs);
  // comedown = first time after peak where total ≤ 50% of peak; clear = ≤ 25 mg
  let comedown=null, clear=null;
  for(let m=0;m<=20*60;m+=5){ const t=peakMs+m*60000; const amt=bodyAt(t); if(comedown===null&&amt<=peakTotal*0.5)comedown=t; if(clear===null&&amt<=25){clear=t;break;} }
  return { last, peakMs, peakTotal, comedown, clear };
}

/* status word for the current level */
function status(){
  const now=NOW(), cur=bodyAt(now); const lim=dailyLimit(); const today=mgToday();
  if(today>lim) return {word:'Over limit',tone:'danger'};
  if(cur<10) return {word:'Clear',tone:'muted'};
  // rising vs falling
  const soon=bodyAt(now+10*60000);
  if(soon>cur+1){ // still climbing
    const t=timing(); if(t && now < t.peakMs-3*60000) return {word:'Kicking in',tone:''};
    return {word:'Peaking',tone:''};
  }
  if(cur>180) return {word:'Wired',tone:'warn'};
  if(cur>60) return {word:'Dialed in',tone:''};
  return {word:'Comedown',tone:'warn'};
}

/* ---------- actions ---------- */
function logDrink(name,mg){
  mg=Math.round(Number(mg)); if(!isFinite(mg)||mg<0)return;
  state.logs.push({ id:'c_'+NOW().toString(36)+Math.random().toString(36).slice(2,5), name:String(name), mg, t:NOW() });
  save(); render();
  const t=timing();
  if(t){ let msg='Logged · peak '+fmtClock(t.peakMs); if(t.comedown)msg+=' · dip '+fmtClock(t.comedown); showToast(msg); }
}
function removeLog(id){ state.logs=state.logs.filter(l=>l.id!==id); save(); render(); }
function addCustom(name,mg){
  name=(name||'').trim(); mg=Math.round(Number(mg));
  if(!name){ showToast('Name your drink first'); return; }
  if(!isFinite(mg)||mg<0){ showToast('Enter the caffeine in mg'); return; }
  if(!state.custom.some(c=>c.name.toLowerCase()===name.toLowerCase())) state.custom.unshift({name,mg});
  save(); logDrink(name,mg); // adds it AND logs it
}
let toastTimer;
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2600); }

/* ---------- chart ---------- */
function curveSvg(){
  const now=NOW(); const start=now-3600000; const end=now+11*3600000; const W=320,H=110, padY=8;
  const pts=[]; let max=1;
  for(let t=start;t<=end;t+=15*60000){ const a=bodyAt(t); if(a>max)max=a; pts.push([t,a]); }
  const lim=dailyLimit();
  const xOf=t=>((t-start)/(end-start))*W;
  const yOf=a=>H-padY-(a/max)*(H-padY*2);
  const line=pts.map((p,i)=>(i?'L':'M')+xOf(p[0]).toFixed(1)+' '+yOf(p[1]).toFixed(1)).join(' ');
  const area=line+' L '+W+' '+(H-padY)+' L 0 '+(H-padY)+' Z';
  const nowX=xOf(now).toFixed(1);
  const t=timing();
  let marks='';
  if(t){ const px=xOf(t.peakMs); if(px>=0&&px<=W) marks+='<line x1="'+px.toFixed(1)+'" y1="0" x2="'+px.toFixed(1)+'" y2="'+H+'" stroke="#22D3EE" stroke-width="1" stroke-dasharray="2 3" opacity=".6"/>';
    if(t.comedown){ const cx=xOf(t.comedown); if(cx>=0&&cx<=W) marks+='<line x1="'+cx.toFixed(1)+'" y1="0" x2="'+cx.toFixed(1)+'" y2="'+H+'" stroke="#FBBF24" stroke-width="1" stroke-dasharray="2 3" opacity=".5"/>'; } }
  return '<div class="chartWrap"><svg class="chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" aria-hidden="true">'
    +'<defs><linearGradient id="cf" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8B5CF6" stop-opacity=".35"/><stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/></linearGradient></defs>'
    +marks
    +'<path d="'+area+'" fill="url(#cf)"/>'
    +'<path d="'+line+'" fill="none" stroke="#22D3EE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0 0 5px rgba(34,211,238,.7))"/>'
    +'<line x1="'+nowX+'" y1="0" x2="'+nowX+'" y2="'+H+'" stroke="#fff" stroke-width="1" opacity=".5"/>'
    +'</svg><div class="chartAxis"><span>now</span><span>+4h</span><span>+8h</span><span>+11h</span></div></div>';
}

/* ---------- render ---------- */
function render(){
  const now=NOW(), cur=Math.round(bodyAt(now)); const st=status(); const t=timing();
  const lim=dailyLimit(), today=Math.round(mgToday()); const pct=Math.min(100, today/lim*100);
  const bed=nextBedtime();

  // hero insight values
  let peakStr='—', comeStr='—', clearStr='—', peakSub='', comeSub='', clearSub='';
  if(t){
    peakStr=fmtClock(t.peakMs); peakSub = now<t.peakMs ? 'in '+mins(t.peakMs-now) : 'reached';
    comeStr=t.comedown?fmtClock(t.comedown):'—'; comeSub=t.comedown&&now<t.comedown?'in '+mins(t.comedown-now):'';
    clearStr=t.clear?fmtClock(t.clear):'—'; clearSub=t.clear?'~back to baseline':'';
  }

  // notes / warnings
  let notes='';
  if(today>lim) notes+='<div class="note danger">⚠ You\'ve had <b>'+today+' mg</b> today — over your <b>'+lim+' mg</b> ceiling. Expect jitters, raised heart rate and poor sleep. Ease off for the rest of the day.</div>';
  else if(today>lim*0.8) notes+='<div class="note warn">You\'re at <b>'+today+' mg</b> of your <b>'+lim+' mg</b> daily limit — one more strong drink will push you over.</div>';
  if(bed){ const atBed=Math.round(bodyAt(bed)); if(atBed>=50) notes+='<div class="note warn">≈<b>'+atBed+' mg</b> will still be in your system at bedtime ('+fmtClock(bed)+'). Caffeine this close to sleep can cut deep sleep — consider switching to decaf now.</div>'; }
  if(!state.logs.length) notes='<div class="note">Log your first drink below and I\'ll predict exactly when you\'ll <b>peak</b> and <b>crash</b> — personalised to your weight, age and sex.</div>';

  // search results
  const q=query.trim().toLowerCase();
  const results = (q? allDrinks().filter(d=>d.name.toLowerCase().includes(q)) : allDrinks()).slice(0,40);

  document.getElementById('app').innerHTML =
    '<header class="header"><div><h1 class="title">Stimulants</h1><p class="subtitle">caffeine · peak &amp; crash timing</p></div>'
    +'<a class="backLink" href="index.html">← Liam</a></header>'

    // HERO
    +'<section class="card hero"><div class="heroTop">'
    +'<div><div class="heroNum">'+cur+'<small>mg in system</small></div></div>'
    +'<span class="statusChip"'+(st.tone?' data-tone="'+st.tone+'"':'')+'><span class="dot"></span>'+st.word+'</span>'
    +'</div>'
    +'<div class="insightRow">'
    +'<div class="insight"><div class="insightLabel peakC">⚡ Peak</div><div class="insightVal peakC">'+peakStr+'</div><div class="insightSub">'+peakSub+'</div></div>'
    +'<div class="insight"><div class="insightLabel crashC">📉 Comedown</div><div class="insightVal crashC">'+comeStr+'</div><div class="insightSub">'+comeSub+'</div></div>'
    +'<div class="insight"><div class="insightLabel clearC">🌙 Cleared</div><div class="insightVal clearC">'+clearStr+'</div><div class="insightSub">'+clearSub+'</div></div>'
    +'</div>'
    + curveSvg()
    + notes
    +'</section>'

    // DAILY LIMIT
    +'<section class="card"><div class="limitHead"><span class="eyebrow" style="margin:0">Today</span>'
    +'<span><span class="limitNum'+(today>lim?'" style="color:var(--danger)':'')+'">'+today+'</span><span class="limitTarget"> / '+lim+' mg</span></span></div>'
    +'<div class="bar"><div class="barFill'+(today>lim?' over':'')+'" style="width:'+pct+'%"></div></div></section>'

    // LOG
    +'<section class="card"><p class="eyebrow">Log a drink</p>'
    +'<div class="quickRow">'
    + quickChip('Coffee',95) + quickChip('Espresso',63) + quickChip('Energy drink',160) + quickChip('Tea',47) + quickChip('Pre-workout',200)
    +'</div>'
    +'<div class="searchRow"><span class="searchIcon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>'
    +'<input class="search" id="searchInput" placeholder="Search 40+ caffeinated drinks…" value="'+esc(query)+'" autocomplete="off"></div>'
    +'<ul class="drinkList">'
    + (results.length? results.map(d=>
        '<li class="drinkRow" data-act="log" data-name="'+esc(d.name)+'" data-mg="'+d.mg+'"><div><div class="drinkName">'+esc(d.name)+'</div><div class="drinkCat">'+esc(d.cat)+'</div></div><div class="drinkMg">'+d.mg+'<small> mg</small></div></li>'
      ).join('') : '<li class="emptyText">No match — add it as a custom drink below.</li>')
    +'</ul></section>'

    // CUSTOM
    +'<section class="card"><p class="eyebrow">Add a custom drink</p>'
    +'<form class="addForm" data-act="addForm"><input class="input" id="cName" placeholder="Drink name" autocomplete="off">'
    +'<input class="input mg" id="cMg" type="number" inputmode="numeric" min="0" max="1000" placeholder="mg"><button type="submit" class="addBtn">Add</button></form>'
    +'<p class="emptyText" style="margin-top:8px">Not on the list? Enter its caffeine in mg — it\'s saved for next time and logged now.</p></section>'

    // TODAY LOG
    + (logsToday().length ?
      '<section class="card"><p class="eyebrow">Today\'s intake</p><ul class="logList">'
      + logsToday().slice().sort((a,b)=>b.t-a.t).map(l=>
        '<li class="logItem"><span class="logTime">'+fmtClock(l.t)+'</span><span class="logName">'+esc(l.name)+'</span><span class="logMg">'+l.mg+' mg</span><button class="delBtn" data-act="del" data-id="'+l.id+'" aria-label="Remove">×</button></li>'
      ).join('') + '</ul></section>' : '');

  const si=document.getElementById('searchInput'); if(si&&query){ si.focus(); si.setSelectionRange(query.length,query.length); }
}
function mins(ms){ const m=Math.round(ms/60000); if(m<60)return m+' min'; const h=Math.floor(m/60),mm=m%60; return h+'h'+(mm?' '+mm+'m':''); }
function quickChip(name,mg){ return '<button class="quickChip" data-act="log" data-name="'+esc(name)+'" data-mg="'+mg+'">'+esc(name)+' · '+mg+'</button>'; }

/* ---------- events ---------- */
document.addEventListener('click',e=>{
  const b=e.target.closest('[data-act]'); if(!b)return;
  const act=b.dataset.act;
  if(act==='log'){ logDrink(b.dataset.name, b.dataset.mg); }
  else if(act==='del'){ removeLog(b.dataset.id); }
});
document.addEventListener('submit',e=>{
  const f=e.target.closest('[data-act="addForm"]'); if(!f)return; e.preventDefault();
  addCustom(document.getElementById('cName').value, document.getElementById('cMg').value);
});
document.addEventListener('input',e=>{ if(e.target.id==='searchInput'){ query=e.target.value; render(); } });

render();
// live ticking so "in X min" + current level stay current
setInterval(()=>{ if(state.logs.length) render(); }, 60000);

/* cloud hydrate */
(async function(){ if(!window.PatronDB||!PatronDB.isCloud())return; try{ const cs=await PatronDB.get('stimulant'); if(cs&&Array.isArray(cs.logs)){ state={logs:cs.logs,custom:Array.isArray(cs.custom)?cs.custom:[]}; try{localStorage.setItem(LS,JSON.stringify(state));}catch(e){} render(); } else { PatronDB.set('stimulant',state); } }catch(e){} })();
</script>
<script src="brand.js?v=16"></script>
</body>
</html>
