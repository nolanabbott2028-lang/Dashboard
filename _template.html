<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0F0F23" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Liam" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />

<!-- 1. CHANGE THE TITLE to your page's name -->
<title>New Page · Liam</title>

<!-- Fonts for the cyberpunk design system (keep as-is) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=Exo+2:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

<!-- Animated neon icons (window.DASH_ICONS) — drop one into a card art tile -->
<script src="icons.js?v=1"></script>

<style>
/* ============================================================
 * Starter page — matches the cyberpunk dashboard:
 * dark OLED bg, neon purple/cyan, Orbitron/Exo 2.
 * Everything is token-driven — reuse var(--brand) etc.
 * ============================================================ */
:root{
  color-scheme: dark;
  --bg:#0F0F23; --bg-elevated:#1A1A3A;
  --surface:rgba(139,92,246,0.06); --surface-2:rgba(139,92,246,0.11);
  --fg:#F8FAFC; --muted:rgba(226,232,255,0.52); --muted-strong:rgba(226,232,255,0.80);
  --border:rgba(124,58,237,0.22); --border-strong:rgba(167,139,250,0.45);
  --brand:#8B5CF6; --brand-2:#22D3EE; --brand-ink:#0B0420;
  --brand-soft:rgba(139,92,246,0.16); --brand-line:rgba(139,92,246,0.40); --brand-glow:rgba(139,92,246,0.65);
  --pos:#22D3EE; --neg:#F472B6; --warn:#FBBF24;
  --card-shadow:0 1px 0 rgba(167,139,250,0.08) inset, 0 22px 50px -28px rgba(0,0,0,0.95);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-16:4rem;
  --radius-md:11px; --radius-lg:18px; --radius-pill:999px;
  --text-xs:.75rem;--text-sm:.875rem;--text-base:1rem;--text-lg:1.125rem;--text-3xl:2.5rem;
  --ease:cubic-bezier(.2,.8,.2,1); --ease-premium:cubic-bezier(.16,1,.3,1); --duration:200ms;
  --font-display:'Orbitron'; --font-ui:'Exo 2'; --font-mono:'JetBrains Mono';
}
*{box-sizing:border-box} html,body{margin:0;padding:0}
body{ background:var(--bg); color:var(--fg); font-family:var(--font-ui),-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; -webkit-font-smoothing:antialiased; }
.page{ position:relative; min-height:100dvh; padding:var(--space-8) var(--space-5) var(--space-16); isolation:isolate; }
.page::before{ content:''; position:absolute; inset:0; pointer-events:none; z-index:-1;
  background: radial-gradient(58% 42% at 82% 6%, rgba(139,92,246,0.22), transparent 70%), radial-gradient(48% 38% at 12% 92%, rgba(34,211,238,0.12), transparent 72%); }
.shell{ max-width:1080px; margin:0 auto; }

/* Header */
.header{ display:flex; align-items:flex-end; justify-content:space-between; gap:var(--space-4); margin-bottom:var(--space-8); flex-wrap:wrap; }
.title{ font-family:var(--font-display); font-weight:800; font-size:var(--text-3xl); line-height:1; letter-spacing:.03em; text-transform:uppercase; margin:0;
  background:linear-gradient(120deg,#fff 35%,var(--brand-2) 75%,var(--brand)); -webkit-background-clip:text; background-clip:text; color:transparent; filter:drop-shadow(0 0 20px rgba(34,211,238,.4)); }
.subtitle{ font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.18em; color:var(--muted); margin:6px 0 0; }
.headerControls{ display:flex; align-items:center; gap:var(--space-3); }
.backLink{ display:inline-flex; align-items:center; gap:6px; padding:7px 14px; background:var(--brand-soft); border:1px solid var(--brand-line); border-radius:var(--radius-pill); color:var(--brand-2); font-size:var(--text-xs); font-weight:600; text-decoration:none; transition:border-color var(--duration) var(--ease-premium), background var(--duration) var(--ease-premium); }
.backLink:hover{ border-color:var(--brand-2); background:rgba(34,211,238,.12); }

/* Cards — NFT/cyberpunk style with a dark art tile + animated icon */
.grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:var(--space-4); }
.card{ position:relative; display:flex; flex-direction:column; border:1px solid var(--border); border-radius:var(--radius-lg); background:var(--bg-elevated); box-shadow:var(--card-shadow); overflow:hidden; transition:border-color var(--duration) var(--ease-premium), transform var(--duration) var(--ease-premium); }
.card:hover{ border-color:var(--brand-line); transform:translateY(-4px); }
.cardArt{ position:relative; aspect-ratio:16/10; background:radial-gradient(circle at 50% 42%, #16162a, #0b0b14 72%); display:grid; place-items:center; overflow:hidden; }
.cardArt::after{ content:''; position:absolute; inset:0; background:radial-gradient(120% 80% at 50% 120%, rgba(0,0,0,.45), transparent 70%); }
.cardArtIcon{ position:relative; z-index:1; display:grid; place-items:center; overflow:visible; }
.cardArtIcon svg{ width:60px; height:60px; display:block; overflow:visible; }
.cardBody{ display:flex; flex-direction:column; gap:4px; padding:14px 15px 16px; }
.cardName{ font-family:var(--font-display); font-weight:700; font-size:var(--text-lg); letter-spacing:.01em; }
.cardDesc{ font-size:12px; color:var(--muted-strong); line-height:1.45; }
.cardStat{ display:flex; flex-direction:column; gap:2px; margin-top:10px; }
.cardStatValue{ font-family:var(--font-display); font-weight:700; font-size:var(--text-lg); color:var(--brand-2); text-shadow:0 0 14px rgba(34,211,238,.45); font-variant-numeric:tabular-nums; }
.cardStatLabel{ font-family:var(--font-mono); font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }

/* Buttons */
.btn{ display:inline-flex; align-items:center; justify-content:center; gap:var(--space-2); padding:.6rem var(--space-4); border-radius:var(--radius-md); font-family:var(--font-ui); font-size:var(--text-sm); font-weight:600; cursor:pointer; border:1px solid transparent; background:transparent; color:var(--fg); transition:filter var(--duration) var(--ease), border-color var(--duration) var(--ease), background var(--duration) var(--ease), box-shadow var(--duration) var(--ease); }
.btn-primary{ background:var(--brand); color:#fff; font-weight:700; }
.btn-primary:hover{ filter:brightness(1.1); box-shadow:0 0 22px var(--brand-glow); }
.btn-ghost{ border:1px solid var(--border-strong); color:var(--fg); }
.btn-ghost:hover{ border-color:var(--brand-line); background:var(--surface); }
</style>
<link rel="stylesheet" href="skin.css?v=1">
</head>
<body>
<main class="page">
  <div class="shell">

    <!-- HEADER: title on the left, back-link on the right -->
    <header class="header">
      <div>
        <!-- 2. CHANGE the title + subtitle -->
        <h1 class="title">New Page</h1>
        <p class="subtitle">one-line tagline</p>
      </div>
      <div class="headerControls">
        <a class="backLink" href="index.html">← Liam</a>
      </div>
    </header>

    <!-- 3. BUILD YOUR PAGE HERE. Use .card / .btn / .btn-primary / .btn-ghost. -->
    <div class="grid">

      <!-- Example card with an animated neon icon.
           Swap 'progress.html' for any key in icons.js (or add your own icon). -->
      <section class="card">
        <div class="cardArt"><span class="cardArtIcon" id="exampleIcon"></span></div>
        <div class="cardBody">
          <span class="cardName">Example card</span>
          <span class="cardDesc">Replace this with your content — it already matches the suite.</span>
          <div class="cardStat"><span class="cardStatValue">0</span><span class="cardStatLabel">your metric</span></div>
        </div>
      </section>

      <!-- Plain card with buttons -->
      <section class="card">
        <div class="cardBody" style="padding-top:18px;">
          <span class="cardName">Buttons</span>
          <span class="cardDesc">The standard button styles:</span>
          <div style="display:flex; gap:var(--space-2); flex-wrap:wrap; margin-top:12px;">
            <button class="btn btn-primary">Primary</button>
            <button class="btn btn-ghost">Ghost</button>
          </div>
        </div>
      </section>

    </div>

  </div>
</main>

<script>
  // Drop an animated icon into the example card (any key from icons.js).
  try { document.getElementById('exampleIcon').innerHTML = (window.DASH_ICONS && window.DASH_ICONS['progress.html']) || ''; } catch(e){}

  /* ---- Your page's JavaScript goes here. ----
     Tip: persist data with a uniquely-named localStorage key,
     e.g. 'mypage_standalone_v1'. */
</script>
<script src="brand.js?v=16"></script>
</body>
</html>
